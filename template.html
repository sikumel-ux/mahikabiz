<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Layanan - MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="service-style.css">
</head>
<body>

    <header class="service-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title">
            <h1>Tiket BUS</h1>
            <p>Pemesanan Tiket Aman & Cepat</p>
        </div>
    </header>

    <main class="service-container">
        <div class="filter-bar">
            <div class="search-input">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" placeholder="Kota Asal">
            </div>
            <div class="search-input">
                <i class="fas fa-location-arrow"></i>
                <input type="text" placeholder="Kota Tujuan">
            </div>
        </div>

        <div class="section-label">Tersedia Hari Ini</div>

        <div class="list-wrapper">
            <div class="card-item">
                <div class="card-info">
                    <div class="brand-info">
                        <span class="brand-name">Murni Jaya</span>
                        <span class="class-type">Executive Class</span>
                    </div>
                    <div class="route-info">
                        <div class="time-box">
                            <strong>07:30</strong>
                            <span>Yogyakarta</span>
                        </div>
                        <div class="arrow-icon">
                            <i class="fas fa-long-arrow-alt-right"></i>
                        </div>
                        <div class="time-box">
                            <strong>19:00</strong>
                            <span>Jakarta</span>
                        </div>
                    </div>
                </div>
                <div class="card-action">
                    <span class="price">Rp 220.000</span>
                    <a href="#" class="book-btn">Pilih</a>
                </div>
            </div>

            <div class="card-item">
                <div class="card-info">
                    <div class="brand-info">
                        <span class="brand-name">Brave Trans</span>
                        <span class="class-type">Super Executive</span>
                    </div>
                    <div class="route-info">
                        <div class="time-box">
                            <strong>16:00</strong>
                            <span>Bantul</span>
                        </div>
                        <div class="arrow-icon">
                            <i class="fas fa-long-arrow-alt-right"></i>
                        </div>
                        <div class="time-box">
                            <strong>04:30</strong>
                            <span>Bandung</span>
                        </div>
                    </div>
                </div>
                <div class="card-action">
                    <span class="price">Rp 250.000</span>
                    <a href="#" class="book-btn">Pilih</a>
                </div>
            </div>

            <div class="card-item">
                <div class="card-info">
                    <div class="brand-info">
                        <span class="brand-name">Mahika Express</span>
                        <span class="class-type">Sleeper Bus</span>
                    </div>
                    <div class="route-info">
                        <div class="time-box">
                            <strong>19:30</strong>
                            <span>Yogyakarta</span>
                        </div>
                        <div class="arrow-icon">
                            <i class="fas fa-long-arrow-alt-right"></i>
                        </div>
                        <div class="time-box">
                            <strong>06:00</strong>
                            <span>Surabaya</span>
                        </div>
                    </div>
                </div>
                <div class="card-action">
                    <span class="price">Rp 350.000</span>
                    <a href="#" class="book-btn">Pilih</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
