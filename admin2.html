<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MAHIKA - Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p-dark: #003B73; --accent: #FFC107; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: var(--p-dark); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: var(--p-dark); margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 0.9rem; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: var(--p-dark); color: white; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .item-row { display: flex; align-items: center; background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .item-info { flex: 1; }
        .item-info b { font-size: 0.9rem; color: var(--p-dark); }
        .item-info p { margin: 0; font-size: 0.75rem; color: #777; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-btn { flex: 1; padding: 18px; text-align: center; cursor: pointer; color: #a0aec0; font-weight: 700; font-size: 0.8rem; }
        .nav-btn.active { color: var(--p-dark); border-top: 4px solid var(--p-dark); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>MAHIKA <span style="color:var(--accent)">ADMIN</span></h2>
</header>

<div class="container">
    <div id="tab-jadwal">
        <div class="card">
            <h3><i class="fas fa-bus"></i> Tambah Jadwal Bus</h3>
            <input type="text" id="tujuan" placeholder="Tujuan (Solo - Jakarta)">
            <input type="text" id="namaPO" placeholder="Nama PO">
            <input type="text" id="jam" placeholder="Jam Keberangkatan">
            <input type="number" id="harga" placeholder="Harga Tiket">
            <input type="text" id="fotoBus" placeholder="Link URL Foto Bus">
            <button class="btn" onclick="simpan('jadwal')">SIMPAN JADWAL</button>
        </div>
        <div id="list-jadwal"></div>
    </div>

    <div id="tab-news" class="hidden">
        <div class="card">
            <h3><i class="fas fa-newspaper"></i> Posting Berita</h3>
            <input type="text" id="judul" placeholder="Judul Berita">
            <textarea id="isi" placeholder="Isi Berita Lengkap..." rows="5"></textarea>
            <input type="text" id="fotoNews" placeholder="Link URL Foto Berita">
            <button class="btn" onclick="simpan('news')" style="background:var(--accent); color:black">PUBLISH NEWS</button>
        </div>
        <div id="list-news"></div>
    </div>
</div>

<nav class="nav-bottom">
    <div class="nav-btn active" onclick="showTab('jadwal', this)"><i class="fas fa-route"></i> JADWAL</div>
    <div class="nav-btn" onclick="showTab('news', this)"><i class="fas fa-bullhorn"></i> NEWS</div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBZNupFpsHWibTfthCtiGc8mzB2q0QaOqY",
        authDomain: "mahikabiz.firebaseapp.com",
        databaseURL: "https://mahikabiz-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mahikabiz",
        storageBucket: "mahikabiz.firebasestorage.app",
        messagingSenderId: "795712739200",
        appId: "1:795712739200:web:5cb7b9627ffccb14f29365"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(id, el) {
        document.getElementById('tab-jadwal').classList.add('hidden');
        document.getElementById('tab-news').classList.add('hidden');
        document.getElementById('tab-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function simpan(type) {
        if(type === 'jadwal') {
            const data = {
                tujuan: document.getElementById('tujuan').value,
                namaPO: document.getElementById('namaPO').value,
                jam: document.getElementById('jam').value,
                harga: document.getElementById('harga').value,
                foto: document.getElementById('fotoBus').value || 'https://via.placeholder.com/150'
            };
            if(!data.tujuan || !data.namaPO) return alert('Isi data minimal Tujuan & PO!');
            db.ref('jadwal').push(data);
            resetForm(['tujuan','namaPO','jam','harga','fotoBus']);
        } else {
            const data = {
                judul: document.getElementById('judul').value,
                isi: document.getElementById('isi').value,
                foto: document.getElementById('fotoNews').value || 'https://via.placeholder.com/150',
                tanggal: new Date().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'})
            };
            if(!data.judul || !data.isi) return alert('Isi Judul & Konten Berita!');
            db.ref('news').push(data);
            resetForm(['judul','isi','fotoNews']);
        }
        alert('Berhasil disimpan!');
    }

    function resetForm(ids) { ids.forEach(id => document.getElementById(id).value = ''); }

    // Realtime Listener untuk List
    db.ref('jadwal').on('value', snap => {
        const data = snap.val();
        let html = '';
        for(let id in data) {
            html += `<div class="item-row">
                <div class="item-info"><b>${data[id].tujuan}</b><p>${data[id].namaPO}</p></div>
                <button class="btn-del" onclick="hapus('jadwal','${id}')"><i class="fas fa-trash"></i></button>
            </div>`;
        }
        document.getElementById('list-jadwal').innerHTML = html;
    });

    db.ref('news').on('value', snap => {
        const data = snap.val();
        let html = '';
        for(let id in data) {
            html += `<div class="item-row">
                <div class="item-info"><b>${data[id].judul}</b><p>${data[id].tanggal}</p></div>
                <button class="btn-del" onclick="hapus('news','${id}')"><i class="fas fa-trash"></i></button>
            </div>`;
        }
        document.getElementById('list-news').innerHTML = html;
    });

    function hapus(type, id) {
        if(confirm('Hapus data ini?')) db.ref(type + '/' + id).remove();
    }
</script>
</body>
</html>
