<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MAHIKA - GDrive Upload</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #003B73; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #loader { display: none; text-align: center; margin-top: 10px; color: #003B73; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">MAHIKA ADMIN</h2>
    <select id="type" onchange="toggleForm()">
        <option value="jadwal">Input Jadwal Bus</option>
        <option value="news">Input Mahika News</option>
        <option value="promo">Input Promo Slider</option>
    </select>

    <div id="f-jadwal">
        <input type="text" id="tujuan" placeholder="Tujuan (Solo - Jakarta)">
        <input type="text" id="po" placeholder="Nama PO">
        <input type="text" id="jam" placeholder="Jam Keberangkatan (cth: 19:00)">
        <input type="number" id="harga" placeholder="Harga">
    </div>

    <div id="f-news" style="display:none">
        <input type="text" id="judul" placeholder="Judul Berita">
        <textarea id="isi" placeholder="Isi Berita Lengkap..." rows="5"></textarea>
    </div>

    <div id="f-promo" style="display:none">
        <select id="slot"><option value="p1">Slot 1</option><option value="p2">Slot 2</option></select>
        <input type="text" id="pjudul" placeholder="Judul Promo">
        <textarea id="pdesk" placeholder="Deskripsi Promo" rows="2"></textarea>
    </div>

    <label>Pilih Foto (Upload ke GDrive):</label>
    <input type="file" id="fileInp">
    
    <button onclick="save()">SIMPAN DATA</button>
    <div id="loader">Sedang Upload ke GDrive...</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwT41qhmkb4qp8IyAYElixThUr7DVoloElrfXMNXzfb0L2GYRQ21QWLEDvbgjbmH2z6bw/exec";
    const firebaseConfig = {
        apiKey: "AIzaSyBZNupFpsHWibTfthCtiGc8mzB2q0QaOqY",
        authDomain: "mahikabiz.firebaseapp.com",
        databaseURL: "https://mahikabiz-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mahikabiz",
        storageBucket: "mahikabiz.firebasestorage.app",
        messagingSenderId: "795712739200",
        appId: "1:795712739200:web:5cb7b9627ffccb14f29365"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleForm() {
        const t = document.getElementById('type').value;
        document.getElementById('f-jadwal').style.display = t === 'jadwal' ? 'block' : 'none';
        document.getElementById('f-news').style.display = t === 'news' ? 'block' : 'none';
        document.getElementById('f-promo').style.display = t === 'promo' ? 'block' : 'none';
    }

    async function save() {
        const file = document.getElementById('fileInp').files[0];
        if(!file) return alert("Pilih foto!");
        document.getElementById('loader').style.display = 'block';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const resp = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ fileData: reader.result, fileName: file.name, mimeType: file.type }) });
            const url = await resp.text();
            
            const type = document.getElementById('type').value;
            if(type === 'jadwal') {
                await db.ref('jadwal').push({ tujuan: document.getElementById('tujuan').value, namaPO: document.getElementById('po').value, jam: document.getElementById('jam').value, harga: document.getElementById('harga').value, foto: url });
            } else if(type === 'news') {
                await db.ref('news').push({ judul: document.getElementById('judul').value, isi: document.getElementById('isi').value, foto: url, tanggal: new Date().toLocaleDateString('id-ID') });
            } else if(type === 'promo') {
                await db.ref('promo/'+document.getElementById('slot').value).set({ judul: document.getElementById('pjudul').value, desk: document.getElementById('pdesk').value, foto: url });
            }
            alert("Berhasil!"); location.reload();
        };
    }
</script>
</body>
</html>
