<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadwal - MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">Jadwal</span></h1>
            <p class="sub-header-text">CEK KEBERANGKATAN BUS</p>
        </div>
    </header>

    <main class="container">
        <div class="search-section">
            <div class="search-card">
                <i class="fas fa-bus-alt"></i>
                <input type="text" id="searchInput" placeholder="Cari tujuan (Contoh: Jambi)..." onkeyup="handleSearch()">
            </div>
        </div>

        <div id="result-section" class="hidden">
            <div class="table-card">
                <div class="table-header">
                    <span><i class="fas fa-list-ul"></i> Hasil Pencarian</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Rute</th>
                            <th>Bus</th>
                            <th>Jam</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-item">
                <div class="s-icon"><i class="fas fa-shield-alt"></i></div>
                <h4>Aman</h4>
                <p>Armada terawat</p>
            </div>
            <div class="service-item">
                <div class="s-icon"><i class="fas fa-bolt"></i></div>
                <h4>Cepat</h4>
                <p>On time bos</p>
            </div>
            <div class="service-item">
                <div class="s-icon"><i class="fas fa-couch"></i></div>
                <h4>Nyaman</h4>
                <p>Full AC & Reclining</p>
            </div>
            <div class="service-item">
                <div class="s-icon"><i class="fas fa-headset"></i></div>
                <h4>24/7</h4>
                <p>Siap bantu terus</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="https://mahika.biz.id" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-home"></i></div>
            <span>Home</span>
        </a>
        <a href="/jadwal" class="nav-item active">
            <div class="nav-icon-wrapper"><i class="fas fa-calendar-alt"></i></div>
            <span>Jadwal</span>
        </a>
        <a href="/tentang" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-user-circle"></i></div>
            <span>Profile</span>
        </a>
        <a href="/kontak" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-comment-dots"></i></div>
            <span>Kontak</span>
        </a>
    </nav>

    <script src="jadwal.js"></script>
</body>
</html>
