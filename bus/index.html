<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Layanan - MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="service-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title">
            <h1>Tiket BUS</h1>
            <p>Pemesanan Tiket Aman & Cepat</p>
        </div>
    </header>

    <main class="service-container">
        <div class="filter-bar">
            <div class="search-input">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" placeholder="Kota Asal (Contoh: Yogyakarta)">
            </div>
            <div class="search-input">
                <i class="fas fa-location-arrow"></i>
                <input type="text" placeholder="Kota Tujuan (Contoh: Jakarta)">
            </div>
        </div>

        <div class="section-label">Jadwal Tersedia</div>

        <div class="list-wrapper">
            <div class="card-item">
                <div class="card-info">
                    <div class="brand-info">
                        <span class="brand-name">Murni Jaya</span>
                        <span class="class-type">Executive</span>
                    </div>
                    <div class="route-info">
                        <div class="time-box">
                            <strong>07:30</strong>
                            <span>Yogyakarta</span>
                        </div>
                        <div class="arrow-icon">
                            <i class="fas fa-long-arrow-alt-right"></i>
                        </div>
                        <div class="time-box">
                            <strong>19:00</strong>
                            <span>Jakarta</span>
                        </div>
                    </div>
                </div>
                <div class="card-action">
                    <span class="price">Rp 220.000</span>
                    <a href="https://wa.me/628123456789" class="book-btn">Pesan Sekarang</a>
                </div>
            </div>

            <div class="card-item">
                <div class="card-info">
                    <div class="brand-info">
                        <span class="brand-name">Brave Trans</span>
                        <span class="class-type">Hiace Luxury</span>
                    </div>
                    <div class="route-info">
                        <div class="time-box">
                            <strong>16:00</strong>
                            <span>Bantul</span>
                        </div>
                        <div class="arrow-icon">
                            <i class="fas fa-long-arrow-alt-right"></i>
                        </div>
                        <div class="time-box">
                            <strong>04:30</strong>
                            <span>Bandung</span>
                        </div>
                    </div>
                </div>
                <div class="card-action">
                    <span class="price">Rp 250.000</span>
                    <a href="https://wa.me/628123456789" class="book-btn">Pesan Sekarang</a>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-home"></i></div>
            <span>Home</span>
        </a>
        <a href="/jadwal" class="nav-item active">
            <div class="nav-icon-wrapper"><i class="fas fa-calendar-alt"></i></div>
            <span>Jadwal</span>
        </a>
        <a href="/tentang" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-user-circle"></i></div>
            <span>Profile</span>
        </a>
        <a href="/kontak" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-comment-dots"></i></div>
            <span>Kontak</span>
        </a>
    </nav>

</body>
</html>
