<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="id.css">
</head>
<body>

    <header class="main-header">
        <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">Trans</span></h1>
        <p class="tagline-yellow">OFFICIAL RESERVATION PARTNER</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cari rute">
        </div>
    </div>

    <main class="container">
        <section class="main-services">
            <a href="/bus" class="service-item">
                <div class="service-icon bg-blue"><i class="fas fa-bus"></i></div>
                <span>BUS</span>
            </a>
            <a href="/travel" class="service-item">
                <div class="service-icon bg-orange"><i class="fas fa-shuttle-van"></i></div>
                <span>TRAVEL</span>
            </a>
            <a href="/kapal" class="service-item">
                <div class="service-icon bg-teal"><i class="fas fa-ship"></i></div>
                <span>KAPAL</span>
            </a>
            <a href="/pesawat" class="service-item">
                <div class="service-icon bg-red"><i class="fas fa-plane"></i></div>
                <span>PESAWAT</span>
            </a>
        </section>

        <div class="section-label"><i class="fas fa-star"></i> Sekilas Info</div>
        <div class="promo-slider" id="promo-list"></div>

        <div class="section-label"><i class="fas fa-bus"></i> Jadwal</div>
        <div class="bus-grid" id="bus-list"></div>

        <div class="section-label"><i class="fas fa-newspaper"></i> Berita</div>
        <div id="news-list"></div>
    </main>

    <div class="marquee-section">
        <div class="marquee-wrapper">
            <div class="marquee-content" id="marquee-po"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="https://mahika.biz.id" class="nav-item active">
            <div class="nav-icon-wrapper"><i class="fas fa-home"></i></div>
            <span>Home</span>
        </a>
        <a href="/jadwal" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-calendar-alt"></i></div>
            <span>Jadwal</span>
        </a>
        <a href="/tentang" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-user-circle"></i></div>
            <span>Profile</span>
        </a>
        <a href="/kontak" class="nav-item">
            <div class="nav-icon-wrapper"><i class="fas fa-comment-dots"></i></div>
            <span>Kontak</span>
        </a>
    </nav>

    <script src="10.js"></script>
</body>
                  </html>
