<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p-dark: #003B73; --accent: #FFC107; --bg: #F4F7FE; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; color: #333; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--p-dark); color: white; padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .logo-admin { font-weight: 800; font-size: 1.5rem; margin-bottom: 40px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .nav-menu { list-style: none; flex: 1; }
        .nav-menu li { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .nav-menu li:hover, .nav-menu li.active { background: rgba(255,255,255,0.1); color: var(--accent); }
        
        /* MAIN CONTENT */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .top-bar h2 { font-weight: 800; color: var(--p-dark); }

        /* DASHBOARD CARDS */
        .card-panel { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 30px; display: none; animation: fadeIn 0.5s ease; }
        .card-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* FORM STYLE */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #666; }
        input, textarea, select { width: 100%; padding: 12px 15px; border: 1px solid #E0E5F2; border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p-dark); box-shadow: 0 0 0 3px rgba(0,59,115,0.1); }
        .full-width { grid-column: span 2; }

        button.btn-primary { background: var(--p-dark); color: var(--accent); border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        button.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,59,115,0.2); }

        /* LIST TABLE */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { text-align: left; padding: 15px; border-bottom: 2px solid #F4F7FE; color: #A3AED0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .data-table td { padding: 15px; border-bottom: 1px solid #F4F7FE; font-weight: 600; font-size: 0.9rem; }
        .btn-del { color: #ff5b5b; cursor: pointer; border: none; background: none; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar span, .logo-admin { display: none; }
            .main-content { margin-left: 70px; padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-admin">MAHIKA ADMIN</div>
    <ul class="nav-menu">
        <li class="active" onclick="showTab('tab-jadwal', this)"><i class="fas fa-bus"></i> <span>Jadwal Bus</span></li>
        <li onclick="showTab('tab-news', this)"><i class="fas fa-newspaper"></i> <span>Mahika News</span></li>
        <li onclick="showTab('tab-partner', this)"><i class="fas fa-handshake"></i> <span>Partner PO</span></li>
        <li onclick="showTab('tab-promo', this)"><i class="fas fa-tag"></i> <span>Promo</span></li>
    </ul>
</aside>

<main class="main-content">
    <div class="top-bar">
        <h2 id="tab-title">Manajemen Jadwal</h2>
        <div style="color: var(--p-dark); font-weight: 600;"><i class="fas fa-user-circle"></i> Admin Mahika</div>
    </div>

    <div id="tab-jadwal" class="card-panel active">
        <h3>Input Rute Baru</h3>
        <div class="form-grid">
            <div class="form-group"><label>Nama PO</label><input type="text" id="j-po" placeholder="Contoh: Sinar Jaya"></div>
            <div class="form-group"><label>Tujuan</label><input type="text" id="j-tujuan" placeholder="Contoh: Surabaya - Jakarta"></div>
            <div class="form-group"><label>Jam</label><input type="text" id="j-jam" placeholder="19:00"></div>
            <div class="form-group"><label>Harga</label><input type="number" id="j-harga" placeholder="250000"></div>
            <div class="form-group full-width"><label>URL Foto</label><input type="text" id="j-foto" placeholder="Link gambar bus"></div>
        </div>
        <button class="btn-primary" onclick="saveJadwal()"><i class="fas fa-plus"></i> Tambah Jadwal</button>
        <br><hr><br>
        <table class="data-table">
            <thead><tr><th>Rute & PO</th><th>Jam</th><th>Harga</th><th>Aksi</th></tr></thead>
            <tbody id="jadwal-list"></tbody>
        </table>
    </div>

    <div id="tab-news" class="card-panel">
        <h3>Buat Berita Baru</h3>
        <div class="form-group"><label>Judul</label><input type="text" id="n-judul"></div>
        <div class="form-group"><label>URL Foto</label><input type="text" id="n-foto"></div>
        <div class="form-group"><label>Isi Berita</label><textarea id="n-isi" rows="5"></textarea></div>
        <button class="btn-primary" onclick="saveNews()"><i class="fas fa-paper-plane"></i> Publish</button>
        <br><hr><br>
        <div id="news-list-admin"></div>
    </div>

    <div id="tab-partner" class="card-panel">
        <h3>Kelola Partner Marquee</h3>
        <div class="form-grid">
            <input type="text" id="p-nama" placeholder="Masukkan Nama PO" style="grid-column: span 1;">
            <button class="btn-primary" onclick="addPartner()" style="width: auto;">TAMBAH PARTNER</button>
        </div>
        <br>
        <div id="partner-list-admin"></div>
    </div>

    <div id="tab-promo" class="card-panel">
        <h3>Banner Promo</h3>
        <div class="form-group"><label>URL Foto Promo (Rasio 2:1)</label><input type="text" id="promo-foto"></div>
        <button class="btn-primary" onclick="savePromo()"><i class="fas fa-image"></i> Simpan Promo</button>
        <br><hr><br>
        <div id="promo-list-admin" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
    </div>

</main>

<script src="admin.js"></script>
<script>
    function showTab(tabId, el) {
        document.querySelectorAll('.card-panel').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.nav-menu li').forEach(li => li.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        document.getElementById('tab-title').innerText = el.innerText;
    }
</script>
</body>
    </html>
