<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Partner Tiket Bus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

</header>

    <div class="section-label"><i class="fas fa-star"></i> Promo Terkini</div>

        </div>

    <div class="section-label"><i class="fas fa-newspaper"></i> Mahika News</div>
    <div id="news-list">
        </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fas fa-ticket-alt"></i><span>Tiket</span></a>
