<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Super App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="main-header">
        <div class="header-content">
            <h1 class="logo-text">MAHIKA <span class="accent-text">Trans</span></h1>
            <div class="header-actions">
                <button id="theme-toggle" class="header-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="header-btn">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </div>
        
        <div class="curve-container">
            <svg class="curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#003B73" d="M0,224L80,213.3C160,203,320,181,480,186.7C640,192,800,224,960,224C1120,224,1280,192,1360,176L1440,160V0H1360C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0H0Z"></path>
            </svg>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Cari layanan, mobil, rute...">
        </div>
    </header>

    <main class="app-body">
        <section class="promo-section">
            <div class="section-header">
                <h3>Promo Bulan Ini</h3>
            </div>
            <div class="scroll-container">
                <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://picsum.photos/400/200?random=1');">
                    <span class="tag">Spesial</span>
                    <h4>Sewa Avanza: Diskon 30%</h4>
                    <p>Hanya berlaku s.d 15 Maret</p>
                </div>
                <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://picsum.photos/400/200?random=2');">
                    <span class="tag tag-new">Baru</span>
                    <h4>Rute Antar Kota Dibuka!</h4>
                    <p>Yogyakarta - Semarang</p>
                </div>
                <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://picsum.photos/400/200?random=3');">
                    <span class="tag tag-limited">Terbatas</span>
                    <h4>Gratis Supir 1 Hari</h4>
                    <p>Booking minggu ini.</p>
                </div>
            </div>
        </section>

        <section class="services-section">
            <div class="services-grid">
                <div class="service-item">
                    <div class="icon-circle svc-1"><i class="fas fa-car-side"></i></div>
                    <span>Sewa Mobil</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-2"><i class="fas fa-shuttle-van"></i></div>
                    <span>Tour & Travel</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-3"><i class="fas fa-plane"></i></div>
                    <span>Antar Jemput</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-4"><i class="fas fa-building"></i></div>
                    <span>Sewa Kantor</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-5"><i class="fas fa-star-of-life"></i></div>
                    <span>Lainnya</span>
                </div>
            </div>
        </section>

        <section class="catalog-section">
            <div class="section-header">
                <h3>Rekomendasi Armada</h3>
                <a href="#" class="see-all">Lihat Semua</a>
            </div>
            <div id="product-grid" class="product-grid">
                </div>
        </section>
    </main>

    <a href="https://wa.me/6281234567890" target="_blank" class="fab-wa">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
