<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Official Reservation Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="main-header">
        <div class="header-content">
            <div class="header-info">
                <div class="branding">
                    <h1 class="logo-text">MAHIKA <span class="accent-text">Trans</span></h1>
                    <p class="tagline">Official Reservation Partner</p>
                </div>
                <div class="info-row">
                    <div class="info-group">
                        <span id="header-date" class="info-text">Memuat...</span>
                        <span id="header-time" class="info-time">00:00:00</span>
                    </div>
                    <span id="header-weather" class="info-weather"><i class="fas fa-cloud-sun"></i> --°C</span>
                </div>
            </div>
            <button id="theme-toggle" class="header-btn"><i class="fas fa-moon"></i></button>
        </div>
        <div class="curve-container">
            <svg class="curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#003B73" d="M0,224L80,213.3C160,203,320,181,480,186.7C640,192,800,224,960,224C1120,224,1280,192,1360,176L1440,160V0H1360C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0H0Z"></path>
            </svg>
        </div>
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Cari tujuan (Contoh: Jakarta)...">
        </div>
    </header>

    <main class="app-body">
        <div id="home-content">
            <section class="scroll-container">
                <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://picsum.photos/400/200?random=1');">
                    <span class="tag">Promo</span>
                    <h4>Diskon Akhir Tahun</h4>
                    <p>Potongan s/d 20% tiket PO tertentu</p>
                </div>
                <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://picsum.photos/400/200?random=2');">
                    <span class="tag">Update</span>
                    <h4>Rute Baru: Sumatera</h4>
                    <p>Kini tersedia lintas Jawa-Sumatera</p>
                </div>
            </section>

            <section class="services-grid">
                <div class="service-item">
                    <div class="icon-circle svc-1"><i class="fas fa-bus"></i></div>
                    <span>Tiket Bus</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-2"><i class="fas fa-shuttle-van"></i></div>
                    <span>Travel</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-3"><i class="fas fa-car"></i></div>
                    <span>Rental</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle svc-4"><i class="fas fa-box"></i></div>
                    <span>Paket</span>
                </div>
            </section>
        </div>

        <section class="catalog-section">
            <div id="search-result-header" style="display:none; padding:0 20px; margin-bottom:15px;">
                <h3>Hasil Pencarian</h3>
            </div>
            <div id="bus-grid" class="product-grid"></div>
        </section>
    </main>

    <div id="modal-profile" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="profile-detail"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Beranda</span></a>
        <a href="#" class="nav-item"><i class="fas fa-ticket-alt"></i><span>Tiket</span></a>
        <a href="#" class="nav-item"><i class="fas fa-tags"></i><span>Promo</span></a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i><span>Akun</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
