<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Reservasi Tiket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">Trans</span></h1>
    <p class="tagline-yellow">OFFICIAL RESERVATION PARTNER</p>
    <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" placeholder="Cari rute atau PO bus...">
    </div>
</header>

<div class="service-menu">
    <div class="service-item"><i class="fas fa-bus"></i><span>Bus</span></div>
    <div class="service-item"><i class="fas fa-ship"></i><span>Kapal</span></div>
    <div class="service-item"><i class="fas fa-plane"></i><span>Pesawat</span></div>
    <div class="service-item"><i class="fas fa-box"></i><span>Paket</span></div>
</div>

<div class="container">
    <div class="section-label"><i class="fas fa-star"></i> Promo Terkini</div>
    <div class="promo-slider" id="promo-list"></div>

    <div class="marquee-container">
        <div class="marquee-content" id="marquee-po"></div>
    </div>

    <div class="section-label"><i class="fas fa-route"></i> Rute Populer</div>
    <div class="bus-grid" id="bus-list"></div>

    <div class="section-label"><i class="fas fa-newspaper"></i> Mahika News</div>
    <div id="news-list"></div>
</div>

<div id="news-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeNews()">&times;</span>
        <img id="modal-img" src="" alt="">
        <h3 id="modal-judul"></h3>
        <p id="modal-desk"></p>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="admin.html" class="nav-item"><i class="fas fa-user-shield"></i><span>Admin</span></a>
</nav>

<script src="script.js"></script>
</body>
</html>
