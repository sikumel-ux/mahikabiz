<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <a href="index.html" style="text-decoration:none">
        <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">Trans</span></h1>
    </a>
    <p class="tagline-yellow">OFFICIAL RESERVATION PARTNER</p>
</header>

<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Cari rute atau PO bus..." onkeypress="handleSearch(event)">
    </div>
</div>

<div class="service-menu">
    <div class="service-item"><i class="fas fa-bus"></i><span>Bus</span></div>
    <div class="service-item"><i class="fas fa-ship"></i><span>Kapal</span></div>
    <div class="service-item"><i class="fas fa-plane"></i><span>Pesawat</span></div>
    <div class="service-item"><i class="fas fa-box"></i><span>Paket</span></div>
</div>

<main class="container">
    <div class="section-label"><i class="fas fa-star"></i> Promo Terkini</div>
    <div class="promo-slider" id="promo-list">
        </div>

    <div class="section-label"><i class="fas fa-route"></i> Rute Populer</div>
    <div class="bus-grid" id="bus-list"></div>

    <div class="section-label"><i class="fas fa-newspaper"></i> Mahika News</div>
    <div id="news-list"></div>
</main>

<div class="marquee-section">
    <div class="section-label" style="padding-left:20px"><i class="fas fa-id-badge"></i> Partner PO Bus</div>
    <div class="marquee-wrapper">
        <div class="marquee-content" id="marquee-po"></div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="javascript:void(0)" onclick="document.getElementById('search-input').focus()" class="nav-item"><i class="fas fa-search"></i><span>Search</span></a>
