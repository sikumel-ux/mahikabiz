<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Partner Tiket Bus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content-center">
            <div class="branding-center">
                <h1 class="logo-text">
                    <span class="m-yellow">MAHIKA</span> <span class="m-white">Trans</span>
                </h1>
                <p class="tagline-yellow">OFFICIAL RESERVATION PARTNER</p>
            </div>
            <div class="info-bar-center">
                <span id="header-date">-- --</span>
                <span class="dot">•</span>
                <span id="header-time">00:00</span>
            </div>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Cari rute, PO bus, atau info...">
        </div>
    </header>

    <main class="app-body">
        <div class="section-label">Promo & Info Terbaru</div>
        <section class="scroll-container" id="promo-container">
            <div class="loading-info">Memuat promo...</div>
        </section>

        <section class="services-grid">
            <div class="svc-item"><div class="svc-icon s1"><i class="fas fa-ticket-alt"></i></div><span>Tiket</span></div>
            <div class="svc-item"><div class="svc-icon s2"><i class="fas fa-shuttle-van"></i></div><span>Travel</span></div>
            <div class="svc-item"><div class="svc-icon s3"><i class="fas fa-car"></i></div><span>Rental</span></div>
            <div class="svc-item"><div class="svc-icon s4"><i class="fas fa-box"></i></div><span>Paket</span></div>
        </section>

        <div class="section-label">Rute Populer</div>
        <section id="bus-grid" class="product-grid-3col">
            </section>

        <div class="section-label">Mahika News</div>
        <section id="news-list" class="news-container">
            </section>

        <div class="section-label">Partner Bus Kami</div>
        <div class="po-ticker-wrapper">
            <div class="ticker-scroll" id="ticker-content">
                </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="changeTab('home', this)">
            <i class="fas fa-home"></i><span>Beranda</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="changeTab('tiket', this)">
            <i class="fas fa-bus"></i><span>Tiket</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="changeTab('news', this)">
            <i class="fas fa-newspaper"></i><span>Berita</span>
        </a>
        <a href="admin.html" class="nav-item">
            <i class="fas fa-user-shield"></i><span>Admin</span>
        </a>
    </nav>

    <div id="modal-news" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeNews()"><i class="fas fa-times"></i></button>
            <div id="news-detail-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
