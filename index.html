<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Official Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content-center">
            <div class="branding-center">
                <h1 class="logo-text">MAHIKA <span class="accent-text">Trans</span></h1>
                <p class="tagline">Official Reservation Partner</p>
            </div>
            
            <div class="info-bar-center">
                <span id="header-date">--</span>
                <span class="dot">•</span>
                <span id="header-time">00:00</span>
                <span class="dot">•</span>
                <span id="header-weather"><i class="fas fa-sun"></i> --°C</span>
            </div>
        </div>
        
        <div class="curve-container">
            <svg class="curve" viewBox="0 0 1440 320"><path fill="#003B73" d="M0,224L80,213.3C160,203,320,181,480,186.7C640,192,800,224,960,224C1120,224,1280,192,1360,176L1440,160V0H1360C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0H0Z"></path></svg>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Mau pergi ke mana hari ini?">
        </div>
    </header>

    <main class="app-body">
        <section class="services-row">
            <div class="svc-mini"><i class="fas fa-bus"></i> Bus</div>
            <div class="svc-mini"><i class="fas fa-shuttle-van"></i> Travel</div>
            <div class="svc-mini"><i class="fas fa-car"></i> Rental</div>
            <div class="svc-mini"><i class="fas fa-box"></i> Paket</div>
        </section>

        <section class="catalog-section">
            <div id="bus-grid" class="product-grid-3col">
                </div>
        </section>

        <div class="ticker-container">
            <div class="ticker-wrap">
                <div class="ticker">
                    <span>MURNI JAYA</span>
                    <span>AGRA MAS</span>
                    <span>PUTRA REMAJA</span>
                    <span>RAMAYANA</span>
                    <span>SINAR JAYA</span>
                    <span>PAHALA KENCANA</span>
                    <span>HARAPAN JAYA</span>
                    <span>MURNI JAYA</span>
                    <span>AGRA MAS</span>
                    <span>PUTRA REMAJA</span>
                    <span>RAMAYANA</span>
                    <span>SINAR JAYA</span>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-profile" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="profile-detail"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
