<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Premium Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="main-header">
        <div class="header-content">
            <h1 class="logo-text">MAHIKA <span class="accent-text">Trans</span></h1>
            <button id="theme-toggle" class="header-btn">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <div class="curve-container">
            <svg class="curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#003B73" d="M0,224L80,213.3C160,203,320,181,480,186.7C640,192,800,224,960,224C1120,224,1280,192,1360,176L1440,160V0H1360C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0H0Z"></path>
            </svg>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Cari armada atau tujuan...">
        </div>
    </header>

    <main class="app-body">
        <section class="scroll-container">
            <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://picsum.photos/400/200?random=10');">
                <span class="tag tag-new">Promo</span>
                <h4>Sewa Lepas Kunci</h4>
                <p>Mulai dari Rp 300rb/hari</p>
            </div>
            <div class="promo-card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://picsum.photos/400/200?random=11');">
                <span class="tag">Update</span>
                <h4>All-in Driver</h4>
                <p>Bensin + Driver + Parkir</p>
            </div>
        </section>

        <section class="services-grid">
            <div class="service-item">
                <div class="icon-circle svc-1"><i class="fas fa-car"></i></div>
                <span>Sewa Mobil</span>
            </div>
            <div class="service-item">
                <div class="icon-circle svc-2"><i class="fas fa-route"></i></div>
                <span>Tour Travel</span>
            </div>
            <div class="service-item">
                <div class="icon-circle svc-3"><i class="fas fa-plane-arrival"></i></div>
                <span>Drop Bandara</span>
            </div>
            <div class="service-item">
                <div class="icon-circle svc-4"><i class="fas fa-briefcase"></i></div>
                <span>Logistik</span>
            </div>
        </section>

        <section class="catalog-section">
            <div class="section-header">
                <h3>Armada Tersedia</h3>
                <a href="#" class="see-all">Lihat Semua</a>
            </div>
            <div id="product-grid" class="product-grid">
                </div>
        </section>
    </main>

    <div class="sticky-action">
        <a href="https://wa.me/6281234567890" class="btn-wa-full">
            <i class="fab fa-whatsapp"></i>
            <span>Hubungi Admin Mahika</span>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-th-large"></i>
            <span>Beranda</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-calendar-check"></i>
            <span>Pesanan</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-tags"></i>
            <span>Promo</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-comment-dots"></i>
            <span>Bantuan</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
