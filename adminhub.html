<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MAHIKA</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F5F7FA; padding: 20px; }
        .card { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #003B73; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #E2E8F0; border-radius: 12px; box-sizing: border-box; }
        .btn { width: 100%; background: #003B73; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Input Jadwal Bus</h2>
    <form id="formJadwal">
        <input type="text" id="tujuan" placeholder="Kota Tujuan" required>
        <input type="text" id="namaPO" placeholder="Nama PO" required>
        <input type="text" id="jam" placeholder="Jam (Contoh: 12:00)" required>
        <input type="number" id="harga" placeholder="Harga (Angka saja)" required>
        <input type="text" id="fotoBus" placeholder="Link Foto Bus">
        <button type="submit" class="btn">Simpan Jadwal</button>
    </form>
</div>

<div class="card">
    <h2>Input Mahika News</h2>
    <form id="formNews">
        <input type="text" id="judul" placeholder="Judul Berita" required>
        <textarea id="isi" placeholder="Ringkasan Berita" rows="3" required></textarea>
        <input type="text" id="fotoNews" placeholder="Link Foto Berita">
        <button type="submit" class="btn" style="background: #FFC107; color: #000;">Posting Berita</button>
    </form>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxb86eZnUZvSYWRkX2uSxohRzien9x1zHyu1XZGkKCV8tekejSG8DygZTdI3bEkDThF0Q/exec";

    async function kirim(payload) {
        alert("Sedang mengirim...");
        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Berhasil!");
        location.reload();
    }

    document.getElementById('formJadwal').onsubmit = (e) => {
        e.preventDefault();
        kirim({
            type: "jadwal",
            tujuan: document.getElementById('tujuan').value,
            namaPO: document.getElementById('namaPO').value,
            jam: document.getElementById('jam').value,
            harga: document.getElementById('harga').value,
            foto: document.getElementById('fotoBus').value
        });
    };

    document.getElementById('formNews').onsubmit = (e) => {
        e.preventDefault();
        kirim({
            type: "news",
            judul: document.getElementById('judul').value,
            isi: document.getElementById('isi').value,
            foto: document.getElementById('fotoNews').value
        });
    };
</script>
</body>
</html>
