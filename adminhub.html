<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAHIKA Trans</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p-dark: #003B73; --accent: #FFC107; --bg: #F0F2F5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        
        /* Sidebar/Header */
        header { background: var(--p-dark); color: white; padding: 25px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h2 { margin: 0; font-weight: 800; letter-spacing: 1px; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        
        /* Card & Forms */
        .card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e1e4e8; }
        .card h3 { margin-top: 0; font-size: 1.1rem; color: var(--p-dark); display: flex; align-items: center; gap: 10px; }
        .card h3 i { color: var(--accent); }

        label { display: block; font-size: 0.8rem; font-weight: 700; margin-top: 15px; color: #666; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 0.9rem; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--p-dark); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-main { background: var(--p-dark); color: white; }
        .btn-main:hover { opacity: 0.9; }
        .btn-cancel { background: #E2E8F0; color: #4A5568; margin-top: 5px; }

        /* List Items */
        .data-list { margin-top: 15px; border-top: 1px solid #eee; }
        .item-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f7f7f7; }
        .item-row img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; background: #eee; }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 0.85rem; }
        .item-info p { margin: 0; font-size: 0.7rem; color: #888; }
        .item-actions { display: flex; gap: 5px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .btn-edit { background: #EBF8FF; color: #3182CE; }
        .btn-del { background: #FFF5F5; color: #E53E3E; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--white); display: flex; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #A0AEC0; font-size: 0.7rem; font-weight: 700; gap: 4px; transition: 0.3s; }
        .nav-item.active { color: var(--p-dark); }
        .nav-item i { font-size: 1.2rem; }

        .hidden { display: none; }
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:9999; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--p-dark)"></i>
    <p style="margin-top:10px; font-weight:700;">Memproses data...</p>
</div>

<header>
    <h2><i class="fas fa-user-shield"></i> ADMIN <span style="color:var(--accent)">MAHIKA</span></h2>
</header>

<div class="container">
    
    <div id="sec-promo">
        <div class="card">
            <h3><i class="fas fa-ad"></i> Update Promo Card Slider</h3>
            <form id="formPromo">
                <label>Pilih Slot Card (1-5):</label>
                <select id="pSlot">
                    <option value="1">Slot 1 (Utama)</option>
                    <option value="2">Slot 2</option>
                    <option value="3">Slot 3</option>
                    <option value="4">Slot 4</option>
                    <option value="5">Slot 5</option>
                </select>
                <input type="text" id="pJudul" placeholder="Judul Promo (Sesuai Judul News)" required>
                <textarea id="pDesk" placeholder="Deskripsi Singkat Promo (Justify)..." rows="2" required></textarea>
                <label>Ganti Foto Promo:</label>
                <input type="file" id="pFoto" accept="image/*">
                <button type="submit" class="btn btn-main"><i class="fas fa-save"></i> Update Card</button>
            </form>
        </div>
    </div>

    <div id="sec-jadwal" class="hidden">
        <div class="card">
            <h3 id="headJadwal"><i class="fas fa-bus"></i> Tambah Jadwal Bus</h3>
            <form id="formJadwal">
                <input type="hidden" id="editRowJdl" value="-1">
                <input type="text" id="tujuan" placeholder="Rute (Contoh: Solo - Jakarta)" required>
                <input type="text" id="namaPO" placeholder="Nama PO Bus" required>
                <input type="text" id="jam" placeholder="Jam Keberangkatan">
                <input type="number" id="harga" placeholder="Harga Tiket">
                <label>Foto Bus:</label>
                <input type="file" id="fBus" accept="image/*">
                <button type="submit" class="btn btn-main" id="btnJdl"><i class="fas fa-plus-circle"></i> Simpan Jadwal</button>
                <button type="button" class="btn btn-cancel hidden" id="cancelJdl" onclick="resetForm('jadwal')">Batal</button>
            </form>
        </div>
        <div class="card">
            <h3><i class="fas fa-list"></i> Daftar Jadwal</h3>
            <div id="list-jadwal" class="data-list">Memuat...</div>
        </div>
    </div>

    <div id="sec-news" class="hidden">
        <div class="card">
            <h3 id="headNews"><i class="fas fa-newspaper"></i> Posting Berita</h3>
            <form id="formNews">
                <input type="hidden" id="editRowNews" value="-1">
                <input type="text" id="judul" placeholder="Judul Berita" required>
                <textarea id="isi" placeholder="Isi berita lengkap (Justify)..." rows="5" required></textarea>
                <label>Foto Berita:</label>
                <input type="file" id="fNews" accept="image/*">
                <button type="submit" class="btn btn-main" id="btnNews" style="background:var(--accent); color:black;"><i class="fas fa-paper-plane"></i> Terbitkan Berita</button>
                <button type="button" class="btn btn-cancel hidden" id="cancelNews" onclick="resetForm('news')">Batal</button>
            </form>
        </div>
        <div class="card">
            <h3><i class="fas fa-history"></i> Riwayat Berita</h3>
            <div id="list-news" class="data-list">Memuat...</div>
        </div>
    </div>

</div>

<nav class="bottom-nav">
    <a href="javascript:void(0)" class="nav-item active" onclick="showTab('promo', this)">
        <i class="fas fa-ad"></i><span>Promo</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" onclick="showTab('jadwal', this)">
        <i class="fas fa-bus"></i><span>Jadwal</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" onclick="showTab('news', this)">
        <i class="fas fa-newspaper"></i><span>News</span>
    </a>
    <a href="index.html" class="nav-item">
        <i class="fas fa-external-link-alt"></i><span>Lihat Web</span>
    </a>
</nav>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx9JsUb0saYvFnH8vpCn2JZu_AzdrXXXmQIcGfMW0dsTvPndFQC_CtKyLhMx_6Kjd_IEg/exec";
    let db = { jadwal: [], news: [], promo: [] };

    // --- Tab System ---
    function showTab(tab, el) {
        document.getElementById('sec-promo').classList.toggle('hidden', tab !== 'promo');
        document.getElementById('sec-jadwal').classList.toggle('hidden', tab !== 'jadwal');
        document.getElementById('sec-news').classList.toggle('hidden', tab !== 'news');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // --- Load & Render Data ---
    async function loadData() {
        const res = await fetch(API_URL);
        db = await res.json();
        renderLists();
    }

    function renderLists() {
        document.getElementById('list-jadwal').innerHTML = db.jadwal.map((item, idx) => `
            <div class="item-row">
                <img src="${item.Foto || ''}">
                <div class="item-info">
                    <h4>${item.Tujuan}</h4>
                    <p>${item["Nama PO"]} • Rp ${Number(item.Harga).toLocaleString('id-ID')}</p>
                </div>
                <div class="item-actions">
                    <button class="btn-icon btn-edit" onclick="prepEditJdl(${idx})"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon btn-del" onclick="hapus('jadwal', ${idx})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');

        document.getElementById('list-news').innerHTML = db.news.map((item, idx) => `
            <div class="item-row">
                <img src="${item.Foto || ''}">
                <div class="item-info">
                    <h4>${item.Judul}</h4>
                    <p>${item.Isi.substring(0, 30)}...</p>
                </div>
                <div class="item-actions">
                    <button class="btn-icon btn-edit" onclick="prepEditNews(${idx})"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon btn-del" onclick="hapus('news', ${idx})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    // --- Submit Logic ---
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = e => reject(e);
    });

    async function send(payload, fileEl) {
        document.getElementById('loading-overlay').style.display = 'flex';
        if (fileEl && fileEl.files[0]) {
            payload.fileData = await toBase64(fileEl.files[0]);
            payload.fileName = fileEl.files[0].name;
        }
        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Data berhasil diproses!");
        location.reload();
    }

    // --- Form Events ---
    document.getElementById('formPromo').onsubmit = e => {
        e.preventDefault();
        send({
            type: "promo",
            slot: document.getElementById('pSlot').value,
            judul: document.getElementById('pJudul').value,
            desk: document.getElementById('pDesk').value
        }, document.getElementById('pFoto'));
    };

    document.getElementById('formJadwal').onsubmit = e => {
        e.preventDefault();
        const row = parseInt(document.getElementById('editRowJdl').value);
        send({
            type: "jadwal",
            action: row > -1 ? "edit" : "add",
            rowIdx: row,
            tujuan: document.getElementById('tujuan').value,
            namaPO: document.getElementById('namaPO').value,
            jam: document.getElementById('jam').value,
            harga: document.getElementById('harga').value,
            oldFoto: row > -1 ? db.jadwal[row].Foto : ""
        }, document.getElementById('fBus'));
    };

    document.getElementById('formNews').onsubmit = e => {
        e.preventDefault();
        const row = parseInt(document.getElementById('editRowNews').value);
        send({
            type: "news",
            action: row > -1 ? "edit" : "add",
            rowIdx: row,
            judul: document.getElementById('judul').value,
            isi: document.getElementById('isi').value,
            oldFoto: row > -1 ? db.news[row].Foto : ""
        }, document.getElementById('fNews'));
    };

    // --- Edit & Delete Logic ---
    function prepEditJdl(idx) {
        const item = db.jadwal[idx];
        document.getElementById('editRowJdl').value = idx;
        document.getElementById('tujuan').value = item.Tujuan;
        document.getElementById('namaPO').value = item["Nama PO"];
        document.getElementById('jam').value = item.Jam;
        document.getElementById('harga').value = item.Harga;
        document.getElementById('headJadwal').innerHTML = '<i class="fas fa-edit"></i> Edit Jadwal Bus';
        document.getElementById('btnJdl').innerHTML = '<i class="fas fa-save"></i> Update Jadwal';
        document.getElementById('cancelJdl').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function prepEditNews(idx) {
        const item = db.news[idx];
        document.getElementById('editRowNews').value = idx;
        document.getElementById('judul').value = item.Judul;
        document.getElementById('isi').value = item.Isi;
        document.getElementById('headNews').innerHTML = '<i class="fas fa-edit"></i> Edit Berita';
        document.getElementById('btnNews').innerHTML = '<i class="fas fa-save"></i> Update Berita';
        document.getElementById('cancelNews').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function hapus(type, idx) {
        if(!confirm("Hapus data ini?")) return;
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({type, action:"delete", rowIdx:idx}) });
        location.reload();
    }

    function resetForm(type) { location.reload(); }

    loadData();
</script>
</body>
    </html>
