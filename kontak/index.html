<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="stylesheet" href="style.css">

<body>

    <header class="main-header">
        <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">KONTAK</span></h1>
        <span class="tagline-yellow">HUBUNGI KAMI 24/7</span>
    </header>

    <div class="container contact-page">
        
        <div class="section-label"><i class="fas fa-map-marked-alt"></i> LOKASI</div>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15863.385352608467!2d106.824584!3d-6.283818!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f21081974783%3A0x6739678e7f8e3676!2sPasar%20Minggu%2C%20Jakarta%20Selatan!5e0!3m2!1sid!2sid!4v1710000000000!5m2!1sid!2sid" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

        <div class="section-label"><i class="fas fa-info-circle"></i> DETAIL KONTAK</div>
        <div class="contact-card">
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="c-text">
                    <strong>Alamat</strong>
                    <p>Jl. Ringroad Selatan No. 144C Dongkelan</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-envelope"></i></div>
                <div class="c-text">
                    <strong>Email</strong>
                    <p>halo@mahika.biz.id</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-clock"></i></div>
                <div class="c-text">
                    <strong>Jam Operasional</strong>
                    <p>08.00 - 20.00 WIB (Setiap Hari)</p>
                </div>
            </div>
        </div>

        <a href="https://wa.me/6281211407667?text=Halo Mahika, saya ingin tanya info reservasi..." class="btn-wa-mahika">
            <i class="fab fa-whatsapp"></i> HUBUNGI VIA WHATSAPP
        </a>

    </div>

    <nav class="bottom-nav">
        <a href="https//mahika.biz.id" class="nav-item">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="/jadwal" class="nav-item">
