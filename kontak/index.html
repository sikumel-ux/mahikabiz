<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontak - MAHIKA TRANS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1 class="logo-text"><span class="m-yellow">MAHIKA</span> <span class="m-white">KONTAK</span></h1>
        <span class="tagline-yellow">HUBUNGI KAMI 24/7</span>
    </header>

    <div class="container contact-page">
        
        <div class="section-label"><i class="fas fa-map-marked-alt"></i> LOKASI</div>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed/v1/place?q=Mahika%20trans&key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

        <div class="section-label"><i class="fas fa-info-circle"></i> DETAIL KONTAK</div>
        <div class="contact-card">
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="c-text">
                    <strong>Alamat</strong>
                    <p>Jl. Ringroad Selatan No. 144C Dongkelan</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-envelope"></i></div>
                <div class="c-text">
                    <strong>Email</strong>
                    <p>halo@mahika.biz.id</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="c-icon"><i class="fas fa-clock"></i></div>
                <div class="c-text">
                    <strong>Jam Operasional</strong>
                    <p>08.00 - 20.00 WIB (Setiap Hari)</p>
                </div>
            </div>
        </div>

        <a href="https://wa.me/6281211407667?text=Halo Mahika, saya ingin tanya info reservasi..." class="btn-wa-mahika">
            <i class="fab fa-whatsapp"></i> HUBUNGI VIA WHATSAPP
        </a>

    </div>

    <nav class="bottom-nav">
        <a href="https://mahika.biz.id" class="nav-item">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="https://mahika.biz.id/jadwal" class="nav-item">
            <i class="fas fa-calendar-alt"></i><span>Jadwal</span>
        </a>
        <a href="https://mahika.biz.id/tentang" class="nav-item">
            <i class="fas fa-user-circle"></i><span>Profil</span>
        </a>
        
        <a href="https://mahika.biz.id/kontak" class="nav-item active">
            <div class="nav-icon-wrapper"><i class="fa-comment-dots"></i></div>
            <span>
    </nav>
