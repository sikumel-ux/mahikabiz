<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIKA Trans - Bus Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="main-header">
        <div class="header-content">
            <div class="header-info">
                <div id="header-date" class="info-text">Memuat tanggal...</div>
                <div class="info-row">
                    <span id="header-time" class="info-time">00:00:00</span>
                    <span id="header-weather" class="info-weather"><i class="fas fa-sun"></i> --°C</span>
                </div>
            </div>
            <button id="theme-toggle" class="header-btn"><i class="fas fa-moon"></i></button>
        </div>
        
        <div class="curve-container">
            <svg class="curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#003B73" d="M0,224L80,213.3C160,203,320,181,480,186.7C640,192,800,224,960,224C1120,224,1280,192,1360,176L1440,160V0H1360C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0H0Z"></path>
            </svg>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Mau pergi ke mana? (Cari rute...)">
        </div>
    </header>

    <main class="app-body">
        <div id="welcome-msg" class="welcome-section">
            <div class="welcome-icon">
                <i class="fas fa-bus-alt"></i>
            </div>
            <h2>Cari Jadwal Bus</h2>
            <p>Masukkan kota tujuan di atas untuk melihat jadwal keberangkatan.</p>
        </div>

        <section class="catalog-section">
            <div id="bus-grid" class="product-grid"></div>
        </section>
    </main>

    <div id="modal-profile" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="profile-detail"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-search"></i><span>Cari</span></a>
        <a href="#" class="nav-item"><i class="fas fa-route"></i><span>Rute</span></a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i><span>Riwayat</span></a>
        <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Setelan</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
